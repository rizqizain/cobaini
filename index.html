<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Catatan Foto</title>
<style>
body { background:#0f172a; color:#fff; font-family:sans-serif; padding:20px; }
.container { max-width:380px; margin:auto; }
video, canvas { width:100%; border-radius:10px; }

button, input {
  width:100%; margin-top:10px; padding:10px;
  border:none; border-radius:10px;
}

button { background:#22c55e; font-weight:bold; }
</style>
</head>
<body>

<div class="container">
  <video id="camera" autoplay></video>
  <button onclick="takePhoto()">Ambil Foto</button>

  <canvas id="photo"></canvas>
  <p id="time"></p>

  <input id="note" placeholder="catatan">

  <button onclick="shareData()">Bagikan ke WA</button>
</div>

<script>
const video = document.getElementById('camera');

// kamera belakang HP
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { exact: "environment" } }
})
.then(stream => video.srcObject = stream)
.catch(() => {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => video.srcObject = stream);
});

function isMobile() {
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function takePhoto() {
  const canvas = document.getElementById('photo');
  const ctx = canvas.getContext('2d');
  const note = document.getElementById('note').value;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  if (isMobile()) {
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }

  ctx.drawImage(video, 0, 0);

  const now = new Date();
  const time = now.toLocaleString('id-ID', {
    day: '2-digit',
    month: '2-digit',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    hour12: false
  });

  document.getElementById('time').innerText = time;

  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, canvas.height - 80, canvas.width, 80);

  ctx.fillStyle = "white";
  ctx.font = "16px Arial";
  ctx.fillText(time, 10, canvas.height - 45);
  ctx.fillText(note, 10, canvas.height - 20);
}

async function shareData() {
  const canvas = document.getElementById('photo');
  const note = document.getElementById('note').value;
  const time = document.getElementById('time').innerText;

  if (!canvas.width) return alert("foto dulu 😭");

  canvas.toBlob(async (blob) => {
    const fileName = `catatan_${note.replace(/\s+/g,'_')}.png`;
    const file = new File([blob], fileName, { type: "image/png" });

    if (navigator.share) {
      try {
        await navigator.share({
          files: [file],
          text: `🧾 ${time}\n${note}`
        });
      } catch (e) {
        alert("gagal share 💀");
      }
    } else {
      alert("ga support, buka di HP 😹");
    }
  });
}
</script>

</body>
</html>
